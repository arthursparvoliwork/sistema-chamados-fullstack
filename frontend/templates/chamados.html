<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard - Chamados</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    background:#111827;
    padding:20px;
    transition:0.3s;
}

.sidebar h2{
    color:#00f2ff;
    margin-bottom:30px;
}

.sidebar button{
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#1f2937;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:6px;
    transition:0.3s;
}

.sidebar button:hover{
    background:#00f2ff;
    color:black;
}

/* MAIN */
.main{
    flex:1;
    padding:30px;
    overflow:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    margin:15px 0;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,255,255,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(0,255,255,0.4);
}

/* LOADING */
.loader{
    border:5px solid #1e293b;
    border-top:5px solid #00f2ff;
    border-radius:50%;
    width:40px;
    height:40px;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    0%{transform:rotate(0deg)}
    100%{transform:rotate(360deg)}
}

</style>
</head>
<body>

<div class="sidebar">
    <h2>ADMIN</h2>
    <button onclick="logout()">Logout</button>
</div>

<div class="main">
    <div class="header">
        <h1>Lista de Chamados</h1>
    </div>

    <div id="loading" class="loader"></div>
    <div id="lista"></div>
</div>

<script>

const token = localStorage.getItem("token")

if(!token){
    window.location.href="login.html"
}

async function carregarChamados(){
    const response = await fetch("http://127.0.0.1:5000/chamados",{
        headers:{
            "Authorization":"Bearer " + token
        }
    })

    const chamados = await response.json()
    document.getElementById("loading").style.display="none"

    const lista = document.getElementById("lista")
    lista.innerHTML=""

    chamados.forEach(c=>{
        lista.innerHTML += `
            <div class="card">
                <h3>${c.titulo}</h3>
                <p>${c.descricao}</p>
                <span>Status: ${c.status}</span>
            </div>
        `
    })
}

function logout(){
    localStorage.removeItem("token")
    window.location.href="login.html"
}

carregarChamados()

</script>

</body>
</html>
