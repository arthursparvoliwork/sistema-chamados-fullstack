<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard - HelpDesk Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    display:flex;
    font-family:'Poppins',sans-serif;
    background:#111;
    color:#fff;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    background:#1b1b2f;
    height:100vh;
    padding:20px;
    transition:0.3s;
}
.sidebar h2{
    text-align:center;
    color:#00f2ff;
}
.sidebar a{
    display:block;
    padding:12px;
    margin:10px 0;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
}
.sidebar a:hover{
    background:#00f2ff;
    color:#000;
}

/* MAIN */
.main{
    flex:1;
    padding:30px;
}

.card{
    background:#1e1e2f;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 0 20px rgba(0,255,255,0.1);
}

button{
    padding:10px 20px;
    background:#00f2ff;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    box-shadow:0 0 15px #00f2ff;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>HelpDesk</h2>
    <a href="#">Dashboard</a>
    <a href="#">Chamados</a>
    <a href="#">Usuários</a>
    <a href="#" onclick="logout()">Sair</a>
</div>

<div class="main">
    <div class="card">
        <h3>Estatísticas</h3>
        <canvas id="grafico"></canvas>
    </div>

    <div class="card">
        <h3>Lista de Chamados</h3>
        <div id="chamados"></div>
    </div>
</div>

<script>
const token = localStorage.getItem("token");
if(!token){
    window.location.href="login.html";
}

async function carregarChamados(){
    const response = await fetch("http://127.0.0.1:5000/chamados",{
        headers:{ "Authorization":"Bearer "+token }
    });

    const data = await response.json();

    let html="";
    data.forEach(c=>{
        html+=`<p><b>${c.titulo}</b> - ${c.status}</p>`;
    });
    chamados.innerHTML=html;
}

function logout(){
    localStorage.removeItem("token");
    window.location.href="login.html";
}

/* GRAFICO */
new Chart(document.getElementById("grafico"), {
    type: 'bar',
    data: {
        labels: ['Abertos', 'Fechados'],
        datasets: [{
            label: 'Chamados',
            data: [5, 2],
        }]
    }
});

carregarChamados();
</script>

</body>
</html>
